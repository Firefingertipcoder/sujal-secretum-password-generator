<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Secretum - C++ WebAssembly Password Generator</title>
    
    <!-- Design styling attributes & meta themes -->
    <meta name="theme-color" content="#030712" />
    <meta name="description" content="High-performance symmetric password planner utilizing native compiled C++ algorithms in WebAssembly." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- PWA Installation Support -->
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Apple WebApp iOS Custom Meta Configurations -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Secretum" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
  </head>
  <body class="bg-gray-950 text-gray-100 antialiased overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Register service worker safely to run offline on mobile devices -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('🛡️ Service Worker registered successfully with scope:', registration.scope);
            })
            .catch((error) => {
              console.warn('⚠️ Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
